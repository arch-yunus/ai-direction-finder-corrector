<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Direction Finder Corrector | TEKNOFEST 2026</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <div class="logo">
            <h1>AI SIGNAL CORRECTOR <span>v3.0</span></h1>
        </div>
        <div class="header-actions">
            <span class="status-badge" id="backendStatus">BACKEND: OFFLINE</span>
            <span class="status-badge" style="background: rgba(168, 255, 0, 0.1); color: var(--accent-tertiary);">ANALYTICS ACTIVE</span>
        </div>
    </header>

    <div class="main-container">
        <section class="radar-section">
            <div class="radar-scan-overlay"></div>
            <canvas id="radarCanvas"></canvas>
            <div class="coordinate-display">
                <span id="coordX">AZ: 000.00°</span>
            </div>
        </section>

        <section class="telemetry-section">
            <div class="panel telemetry">
                <h3>LIVE SIGNAL DATA</h3>
                <div class="data-row">
                    <span class="data-label">Active Targets:</span>
                    <span id="targetCount" class="data-value">0</span>
                </div>
                <div class="data-row">
                    <span class="data-label">Geometric AoA:</span>
                    <span id="baselineAngle" class="data-value">000.00°</span>
                </div>
                <div class="data-row">
                    <span class="data-label">AI Corrected AoA:</span>
                    <span id="correctedAngle" class="data-value ai-value">000.00°</span>
                </div>
                <hr style="margin: 0.8rem 0; border: 0; border-top: 1px solid rgba(255,255,255,0.05);">
                <div class="data-row">
                    <span class="data-label">Kalman Smoothing:</span>
                    <label class="switch">
                        <input type="checkbox" id="kalmanToggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="data-row">
                    <span class="data-label">AI Optimization:</span>
                    <label class="switch">
                        <input type="checkbox" id="aiToggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="panel analytics">
                <h3>PERFORMANCE ANALYTICS</h3>
                <div class="chart-container" style="height: 180px; position: relative;">
                    <canvas id="accuracyChart"></canvas>
                </div>
            </div>

            <div class="panel logs">
                <h3>SYSTEM LOGS</h3>
                <div class="terminal" id="terminal"></div>
                <div style="margin-top: 1rem; display: flex; gap: 8px;">
                    <button class="glow-btn small" id="rescanBtn">RESET</button>
                    <button class="glow-btn small" id="trainBtn" style="border-color: var(--accent-secondary); color: var(--accent-secondary);">TRAIN</button>
                </div>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
